<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Toko PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AppToko">
<meta name="theme-color" content="#4a90e2">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #dce8f8 0%, #c8d9f0 40%, #b8cfe8 100%);
    min-height: 100vh;
    padding: 48px 20px;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Badge atas */
  .page-header { text-align: center; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    color: #3a6fc4;
    letter-spacing: 0.3px;
  }
  .dot {
    width: 8px; height: 8px;
    background: #4a90e2;
    border-radius: 50%;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 8px 32px rgba(74,144,226,0.12), 0 2px 8px rgba(0,0,0,0.06);
  }

  /* Card title */
  .card-title { margin-bottom: 24px; }
  .card-title h2 {
    font-size: 18px;
    font-weight: 700;
    color: #1a2e4a;
    letter-spacing: -0.2px;
  }
  .card-title p {
    font-size: 12px;
    font-weight: 400;
    color: #7a9bbf;
    margin-top: 2px;
  }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: linear-gradient(135deg, rgba(74,144,226,0.1), rgba(53,122,189,0.06));
    border: 1px solid rgba(74,144,226,0.18);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-val {
    font-size: 20px;
    font-weight: 700;
    color: #2869b0;
    margin-bottom: 3px;
  }
  .stat-lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #7a9bbf;
    font-weight: 600;
  }

  /* Live badge */
  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(74,144,226,0.08);
    border: 1px solid rgba(74,144,226,0.2);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 11px;
    color: #4a6fa5;
    font-weight: 500;
    width: fit-content;
    margin-bottom: 20px;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 1.8s infinite;
  }

  /* Search */
  .search-wrap { margin-bottom: 20px; }
  #searchInput {
    width: 100%;
    padding: 11px 16px;
    border-radius: 12px;
    border: 1.5px solid #d0dff0;
    background: rgba(255,255,255,0.8);
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    color: #1a2e4a;
    outline: none;
    transition: all 0.2s;
  }
  #searchInput:focus {
    border-color: #4a90e2;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(74,144,226,0.12);
  }
  #searchInput::placeholder { color: #a8bdd4; font-size: 13px; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; min-width: 360px; }
  thead tr {
    background: linear-gradient(90deg, rgba(74,144,226,0.08), rgba(53,122,189,0.05));
  }
  th {
    padding: 12px 16px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #4a6fa5;
    text-align: left;
    border-bottom: 2px solid rgba(74,144,226,0.15);
  }
  th:last-child { text-align: right; }
  td {
    padding: 13px 16px;
    font-size: 13.5px;
    color: #2c4a6e;
    border-bottom: 1px solid rgba(74,144,226,0.08);
    transition: background 0.15s;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(74,144,226,0.04); }

  .id-cell {
    font-size: 11px;
    font-weight: 600;
    color: #9ab5d0;
    font-family: monospace;
  }
  .name-cell {
    font-weight: 600;
    color: #1a2e4a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .name-cell::before {
    content: '';
    width: 6px; height: 6px;
    background: #4a90e2;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .price-cell { text-align: right; }
  .price-badge {
    display: inline-flex;
    background: linear-gradient(135deg, #e8f2fd, #d0e6f8);
    color: #2869b0;
    border: 1px solid rgba(74,144,226,0.2);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* Empty */
  .empty-state { text-align: center; padding: 40px 0; color: #9ab5d0; }
  .empty-state p { font-size: 13px; }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 11px;
    color: #9ab5d0;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header badge -->
  <div class="page-header">
    <div class="badge">
      <span class="dot"></span>
      Sistem Manajemen Toko
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-title">
      <h2>Daftar Barang</h2>
      <p>Semua produk yang tersedia di toko</p>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" id="statTotal">—</div>
        <div class="stat-lbl">Total Produk</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statMin">—</div>
        <div class="stat-lbl">Harga Terendah</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statMax">—</div>
        <div class="stat-lbl">Harga Tertinggi</div>
      </div>
    </div>

    <!-- Live badge -->
    <div class="live-badge">
      <span class="live-dot"></span>
      Live dari database
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Cari nama barang...">
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nama Barang</th>
            <th>Harga</th>
          </tr>
        </thead>
        <!-- Diisi oleh app.js -->
        <tbody id="tabel-barang">
          <tr>
            <td colspan="3">
              <div class="empty-state"><p>Memuat data...</p></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <p class="footer">Data ditarik langsung dari MySQL via PHP API &middot; PWA Ready</p>
</div>

<script src="app.js"></script>
</body>
</html>
